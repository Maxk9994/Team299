<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team299{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="logo-box">
                <img src="{{ url_for('static', filename='images/calendar-logo.png') }}" alt="Logo">
            </div>

        <nav class="top-nav-links">

            {% if session.get('user_id') %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('availability') }}">Availability</a>
                <a href="{{ url_for('meetings') }}">Meetings</a>
                <a href="{{ url_for('alerts') }}">Alerts</a>
                <a href="{{ url_for('calendar') }}">Calendar</a>
                <a href="{{ url_for('profile') }}">Profile</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('register') }}">Register</a>
            {% endif %}
        </nav>
        </header>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
