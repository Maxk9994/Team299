<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team299{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="logo-box">
                <img src="{{ url_for('static', filename='images/calendar-logo.png') }}" alt="Logo">
            </div>

            <nav class="top-nav-links">
                <a href="{{ url_for('home') }}">Dashboard</a>
                <a href="{{ url_for('availability') }}">Availability</a>
                <a href="{{ url_for('meetings') }}">Meetings</a>
                <a href="{{ url_for('alerts') }}">
                    Alerts {% if unread_count > 0 %} ({{ unread_count }}) {% endif %}
                </a>
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('calendar') }}">Calendar</a>
            </nav>

            <div class="user-menu">User ▾</div>
        </header>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
